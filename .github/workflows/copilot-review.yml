name: Copilot Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot review
        uses: github/copilot-pull-request-reviewer@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
